# ArgoCD Application — Cassandra (cass-operator-managed).
# Synced by application-platform (the parent wrapper).
#
# sync-wave "1" inside manifests/platform/: applies AFTER cass-operator-subscription
# (wave 0) reaches Healthy / CSV Succeeded, so the CassandraDatacenter CRD exists
# by the time this Application creates the CR.
#
# Iteration knob: `spec.source.targetRevision`.
#   - During iteration:  the active branch (e.g., `app-of-apps`)
#   - After PR merge:    flip to `main` as the last commit on the PR.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cassandra
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    # Cascade-delete synced resources (the CassandraDatacenter CR) when this
    # Application is deleted. The operator then cleans up StatefulSet, PVCs, etc.
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/thatdot/thatdot-openshift
    path: manifests/cassandra
    targetRevision: debug-access-claims-map-loop
  destination:
    server: https://kubernetes.default.svc
    namespace: thatdot-openshift
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
