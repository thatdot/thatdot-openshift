---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Platform wrapper: holds only ArgoCD Application CRs. Each Application points
# at a leaf (manifests/cassandra/, manifests/keycloak/) which owns the full
# stack — operator subscriptions, workload CRs, supporting resources — wired
# up with intra-leaf sync-waves.
#
# As of step 5, no operator subscriptions live at this layer — they were moved
# into their respective leaves to unify the single-Application-boundary pattern
# (step 5 moved cass-operator-subscription out; the new Keycloak stack
# follows the same shape from day one). See step 5's Architectural Decisions
# in IMPLEMENTATION_PLAN.md.
#
# Both Applications below carry sync-wave "1" (annotations on the resources
# themselves). They are siblings — applied in parallel by ArgoCD; each waits
# on its own internal wave 0 (operator install) before applying CRs.
resources:
  - application-cassandra.yaml
  - application-keycloak.yaml
