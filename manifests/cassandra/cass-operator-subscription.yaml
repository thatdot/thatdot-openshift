# k8ssandra cass-operator install — synced by application-cassandra.
#
# Layout note (step 5 refactor): this Subscription was originally placed in
# manifests/platform/ in step 3. Step 5 moved it into manifests/cassandra/
# alongside the CassandraDatacenter CR it reconciles, matching the
# single-Application-boundary pattern used for the Keycloak stack. Net effect:
# `oc delete application cassandra` cleans up the whole stack (operator sub +
# RoleBinding + CR), and a fresh sync re-installs everything.
#
# Install mode: OwnNamespace. The OperatorGroup lives in `thatdot-openshift` and
# targets that same namespace, so the operator pod runs alongside the workloads
# it manages. Avoids AllNamespaces mode (which would force the operator into the
# cluster-scoped `openshift-operators` namespace and conflict with our
# namespace-scoped GitOps install).
#
# The same OperatorGroup `thatdot-openshift-operators` is reused by the RHBK and
# CNPG operators installed by application-keycloak — its existence is shared
# infra for any future OwnNamespace operator in this namespace.
#
# Package name: `cass-operator-community` (the bare `cass-operator` belongs to a
# different/conflicting catalog entry).
#
# sync-wave "0" inside manifests/cassandra/: the operator must be installed
# (CSV Succeeded) before wave 1's CassandraDatacenter CR can be created.
# ArgoCD's built-in Subscription health check does the gating.
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: thatdot-openshift-operators
  namespace: thatdot-openshift
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  targetNamespaces:
    - thatdot-openshift   # OwnNamespace: target == operator's own namespace
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: cass-operator-community
  namespace: thatdot-openshift
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: cass-operator-community
  source: community-operators
  sourceNamespace: openshift-marketplace
