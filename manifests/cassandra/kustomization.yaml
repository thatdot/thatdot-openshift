---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Single-Application boundary for the Cassandra stack (operator + workload CRs
# in one leaf). Refactored in step 5 from the original step-3 layout where the
# operator subscription lived in manifests/platform/. See step 5's Layout block
# and CLAUDE.md "File layout" for the pattern rationale.
#
# Internal sync-wave ordering (annotations on the resources themselves):
#   wave 0:  cass-operator-subscription  — install operator, wait for CSV Succeeded
#            serviceaccount              — anyuid RoleBinding for default SA
#                                          (needs to exist before operator spawns pods)
#   wave 1:  cassandradatacenter         — CR the operator reconciles into a cluster
#
# Listed in logical order — Kustomize sorts by Kind anyway, but the listing
# tells the next reader what to look at first.
resources:
  - cass-operator-subscription.yaml
  - serviceaccount.yaml
  - cassandradatacenter.yaml
