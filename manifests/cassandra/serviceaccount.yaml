# RoleBinding granting the namespace's `default` ServiceAccount the `anyuid` SCC.
#
# Why this exists:
# cass-operator hardcodes the pod's `securityContext` to UID/GID/fsGroup 999
# (the standard `cassandra` user in DataStax/k8ssandra images). OpenShift's
# default `restricted-v2` SCC requires a random UID in the high range and
# rejects fixed UID 999 outright.
#
# Why we bind to `default` and not a dedicated SA:
# We initially tried directing cass-operator to use a dedicated `cassandra-sa`
# via `spec.serviceAccount` on the CassandraDatacenter CR. cass-operator's
# validating webhook (`vcassandradatacenter.kb.io`) rejects modifications to
# that field after the CR is created — it's effectively immutable post-create.
# Rather than delete-and-recreate the CR, we bind the namespace `default` SA
# (which cass-operator uses by default) to the `anyuid` SCC.
#
# Scope: this grant is namespace-scoped to `thatdot-openshift` only.
# Within the namespace, default-SA pods that pin UID 999 (cass-operator's
# Cassandra pods) gain access to anyuid; default-SA pods that don't pin a
# UID still get `restricted-v2` (most-restrictive applicable SCC wins).
# The Cassandra pod also has `runAsNonRoot: true` set by the operator, so
# even with anyuid available, root is not actually permitted.
#
# Filename note: still called `serviceaccount.yaml` since it relates to SA
# permissions, even though we no longer create a dedicated SA.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: default-sa-anyuid
  namespace: thatdot-openshift
  annotations:
    # Wave 0 alongside the operator subscription — the RoleBinding must exist
    # before wave 1's CassandraDatacenter CR is created (and thus before the
    # operator spawns Cassandra pods using the namespace's default SA).
    argocd.argoproj.io/sync-wave: "0"
subjects:
  - kind: ServiceAccount
    name: default
    namespace: thatdot-openshift
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
