# ServiceAccount + RoleBinding for the Cassandra StatefulSet pods.
#
# Why this exists:
# cass-operator hardcodes the pod's `securityContext` to UID/GID 999
# (the standard `cassandra` user in DataStax/k8ssandra images). OpenShift's
# default `restricted-v2` SCC requires a random UID in a high range and
# rejects fixed UID 999 outright. We grant a dedicated ServiceAccount the
# `anyuid` SCC, then point the CassandraDatacenter at it.
#
# This is more focused than granting `anyuid` to the namespace's `default`
# ServiceAccount: only Cassandra pods get the elevated permission, not every
# pod in the namespace. The pod still has `runAsNonRoot: true` set by the
# operator, so even with anyuid available, root is not actually permitted.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cassandra-sa
  namespace: thatdot-openshift
---
# Grants `cassandra-sa` the `use` verb on the `anyuid` SCC. OpenShift
# auto-creates a ClusterRole named `system:openshift:scc:<scc-name>` for
# every SCC; binding to it is how `oc adm policy add-scc-to-user` works
# under the hood.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cassandra-sa-anyuid
  namespace: thatdot-openshift
subjects:
  - kind: ServiceAccount
    name: cassandra-sa
    namespace: thatdot-openshift
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
