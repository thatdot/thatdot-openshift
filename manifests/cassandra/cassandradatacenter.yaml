# Single-node Cassandra cluster, managed by k8ssandra cass-operator.
#
# Service names produced by the operator (referenced by QE):
#   - quine-dc1-service             — CQL clients (port 9042)        ← QE talks to this
#   - quine-dc1-all-pods-service    — per-pod DNS (StatefulSet governing service)
#   - quine-seed-service            — seed node discovery
#
# Superuser Secret auto-created by the operator: `quine-superuser`
# (data keys: `username` and `password`).
#
# v1 scope: single node, RF 1, no auth tuning, no monitoring. step 3's discovery
# goal is "QE writes through to a stateful workload"; production hardening is
# explicitly deferred.
---
apiVersion: cassandra.datastax.com/v1beta1
kind: CassandraDatacenter
metadata:
  name: dc1
  namespace: thatdot-openshift
  annotations:
    # Wave 1 — applied after wave 0 (operator subscription + RoleBinding) is
    # Synced. ArgoCD's built-in Subscription health check keeps wave 0
    # Progressing until the CSV is Succeeded, so cass-operator's CRDs exist
    # by the time this CR is created.
    argocd.argoproj.io/sync-wave: "1"
    # CRD `cassandra.datastax.com/v1beta1` is installed by cass-operator in
    # wave 0 of this same Application. Without this annotation, ArgoCD's
    # pre-flight dry-run fails (CRD doesn't exist yet) and aborts the WHOLE
    # sync — wave 0 never gets a chance to install the operator. This option
    # tells ArgoCD: skip dry-run when the CRD isn't installed yet, and just
    # apply when this resource's wave comes up. The CRD will exist by then.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  clusterName: quine
  serverType: cassandra
  serverVersion: "4.1.4"
  size: 1                           # minimum allowed; v1 is single-node

  # Note: `spec.serviceAccount` is intentionally NOT set here. cass-operator's
  # validating webhook makes that field effectively immutable after CR creation,
  # so changing it would require a delete-and-recreate. Instead, the namespace's
  # `default` ServiceAccount is granted the `anyuid` SCC (see serviceaccount.yaml),
  # which is what the operator uses anyway when this field is empty.

  # PVC against CRC's default StorageClass. On a real cluster, this would be a
  # higher-performance class (gp3, io2, etc.) sized to the workload.
  storageConfig:
    cassandraDataVolumeClaimSpec:
      storageClassName: crc-csi-hostpath-provisioner
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi

  # Cassandra config. Heap pinned so Cassandra doesn't grab ~25% of CRC's RAM
  # (its default behavior) and OOM under our tighter ceiling.
  # `jvm-server-options` is the Cassandra 4.x path; `jvm-options` is for 3.x.
  config:
    jvm-server-options:
      initial_heap_size: "512M"
      max_heap_size: "512M"
    cassandra-yaml:
      num_tokens: 16
