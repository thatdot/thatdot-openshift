---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: thatdot-openshift
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          # Non-root variant: required under restricted-v2 SCC.
          # Standard `nginx:latest` binds port 80 as root and crashloops here.
          image: nginxinc/nginx-unprivileged:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          # Note: NO `runAsUser` set. restricted-v2 assigns a random UID;
          # pinning a UID here would cause the pod to be rejected.
