---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: nginx
  namespace: thatdot-openshift
  labels:
    app: nginx
spec:
  to:
    kind: Service
    name: nginx
    weight: 100
  port:
    targetPort: http   # named port on the Service (port 8080)
  tls:
    # Cluster's default wildcard cert handles HTTPS at the router edge;
    # plain HTTP between the OpenShift router and the nginx pod.
    termination: edge
    insecureEdgeTerminationPolicy: Redirect   # http:// → https:// auto-redirect
  wildcardPolicy: None
