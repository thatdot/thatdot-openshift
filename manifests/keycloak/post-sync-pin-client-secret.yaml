# PostSync hook: reconcile the quine-enterprise-client's client_secret in
# Keycloak to match the value in the K8s Secret.
#
# The pinned-secret pattern:
#   - quine-enterprise-oidc-credentials Secret in thatdot-openshift namespace
#     is the SOURCE OF TRUTH for the client_secret. It's created at bootstrap
#     with a freshly-generated random value, and preserved across realm
#     re-imports.
#   - QE's pod consumes this Secret directly (no Keycloak round-trip needed).
#   - When the realm is imported (or re-imported), the operator auto-generates
#     a different client_secret because the realm yaml deliberately omits the
#     `secret:` field. This hook overwrites that auto-generated value with
#     the one from our K8s Secret.
#   - Result: the client_secret QE expects and the client_secret Keycloak
#     issues are always the same — even across realm re-imports.
#
# Why we don't pin via spec.placeholders in the KeycloakRealmImport CR:
#   The operator's placeholders feature only injects env vars onto the import
#   Job pod. The actual kc.sh import command (hardcoded in the operator) does
#   not enable placeholder substitution, so ${VAR} patterns in the realm JSON
#   are stored as literals. Verified via operator source as of upstream main
#   (KeycloakRealmImportJobDependentResource.java:170-176) and Keycloak issue
#   #26275. Pinning via a post-import kcadm update is more reliable.
#
# ArgoCD wave ordering:
#   PostSync hooks run AFTER all Sync-phase resources are Healthy. The
#   KeycloakRealmImport CR has a custom health check in
#   bootstrap/argocd-customizations.yaml that returns Healthy only when
#   status.conditions[Done].status == True — so this hook is guaranteed to
#   run after the realm + client exist.
#
# Idempotency:
#   kcadm update clients/<id> -s secret=<value> is a no-op when the value is
#   already correct. Safe to run on every sync (including drift-only syncs).
---
apiVersion: batch/v1
kind: Job
metadata:
  name: pin-client-secret
  namespace: thatdot-openshift
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: realm-iteration-hook
      containers:
        - name: pin-client-secret
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              NAMESPACE="thatdot-openshift"
              REALM="quine-enterprise"
              CLIENT_ID="quine-enterprise-client"

              echo "==> Loading desired client_secret from quine-enterprise-oidc-credentials..."
              DESIRED_SECRET=$(oc get secret quine-enterprise-oidc-credentials -n "$NAMESPACE" \
                  -o jsonpath='{.data.client-secret}' | base64 -d)
              if [[ -z "$DESIRED_SECRET" ]]; then
                  echo "ERROR: quine-enterprise-oidc-credentials Secret has empty 'client-secret' key."
                  echo "       Bootstrap may not have run create-qe-oidc-credentials-secret.sh."
                  exit 1
              fi
              echo "    Desired client_secret loaded (<not echoed>)."

              echo "==> Loading admin credentials from keycloak-initial-admin Secret..."
              ADMIN_USER=$(oc get secret keycloak-initial-admin -n "$NAMESPACE" \
                  -o jsonpath='{.data.username}' | base64 -d)
              ADMIN_PW=$(oc get secret keycloak-initial-admin -n "$NAMESPACE" \
                  -o jsonpath='{.data.password}' | base64 -d)

              echo "==> Locating the Keycloak pod..."
              KC_POD=$(oc get pod -n "$NAMESPACE" -l app=keycloak \
                  -o jsonpath='{.items[?(@.status.phase=="Running")].metadata.name}' 2>/dev/null \
                  | awk '{print $1}')
              if [[ -z "$KC_POD" ]]; then
                  echo "ERROR: no Running keycloak pod found in $NAMESPACE."
                  exit 1
              fi
              echo "    Found Keycloak pod: $KC_POD"

              echo "==> Pinning client_secret for $CLIENT_ID in realm $REALM..."
              # Two values passed via env to avoid shell-quoting issues on
              # special characters. -q exact=true on the clients lookup so we
              # don't fuzzy-match other clients (the CLAUDE.md kcadm gotcha).
              oc exec -n "$NAMESPACE" "$KC_POD" -- \
                  env ADMIN_PW="$ADMIN_PW" DESIRED_SECRET="$DESIRED_SECRET" /bin/bash -c "
                  set -euo pipefail
                  /opt/keycloak/bin/kcadm.sh config credentials \
                      --server http://localhost:8080 --realm master \
                      --user '$ADMIN_USER' --password \"\$ADMIN_PW\" >/dev/null

                  CID=\$(/opt/keycloak/bin/kcadm.sh get clients -r $REALM \
                      -q exact=true -q clientId=$CLIENT_ID \
                      --fields id --format csv --noquotes | tail -1 | tr -d '\r')
                  if [[ -z \"\$CID\" ]]; then
                      echo \"ERROR: client '$CLIENT_ID' not found in realm '$REALM'\" >&2
                      exit 1
                  fi

                  /opt/keycloak/bin/kcadm.sh update clients/\$CID -r $REALM \
                      -s \"secret=\$DESIRED_SECRET\"
              "

              echo "==> Done. quine-enterprise-client's client_secret is now"
              echo "    reconciled to the pinned value in K8s."
