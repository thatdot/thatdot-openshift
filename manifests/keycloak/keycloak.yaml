# Keycloak instance — RHBK (Red Hat Build of Keycloak).
#
# Topology (the "edge-terminated Route, single Route URL as Keycloak hostname"
# decision from step 5):
#
#   Browser ──HTTPS (cluster wildcard cert)──> OpenShift router ──HTTP──> Keycloak pod
#
# `http.enabled: true` makes Keycloak listen on plain HTTP internally; OpenShift
# Route handles TLS termination at the edge with the cluster's default wildcard
# cert. `proxy.headers: xforwarded` tells Keycloak to trust the router's
# X-Forwarded-Proto: https header, so the discovery doc + JWT iss claim emit
# `https://...` URLs even though Keycloak's process saw HTTP internally.
#
# `hostname.hostname` MUST match what the browser uses (the Route URL). On CRC
# the apps domain is deterministic — Route `<name>-<ns>.apps-crc.testing`.
# When porting to a real cluster, swap the suffix for that cluster's
# `*.apps.<cluster>.<domain>`.
#
# `ingress.enabled: false`: we own the Route (manifests/keycloak/route.yaml).
# Letting the operator manage Ingress would mint a Route with edge termination
# defaults that may not match — explicit is clearer.
#
# DB credentials come from the `keycloak-postgres-app` Secret created
# out-of-band by `scripts/create-keycloak-postgres-secret.sh` (called from
# bootstrap.sh). The same Secret is consumed by manifests/keycloak/postgres.yaml
# to initialize the Postgres user on first boot. Keys: `username`, `password`.
#
# sync-wave "2": Wave-1 (Postgres Deployment + Service) must be running for
# Keycloak to connect on first start. The Secret is created by bootstrap.sh
# imperatively, so it pre-exists ArgoCD's first sync.
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: thatdot-openshift
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # CRD `k8s.keycloak.org/Keycloak` is installed by RHBK operator in wave 0
    # of this same Application. See cassandradatacenter.yaml for the full
    # explanation of why this annotation is required.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instances: 1
  # Resource requests/limits. Without these, the operator defaults to ~1700Mi
  # memory request for both the Keycloak pod AND the realm-import Job pod.
  # On a single-node CRC at 18Gi total, the realm-import pod ends up Pending
  # with `FailedScheduling: Insufficient memory` once Cassandra + QE + Postgres
  # are also resident. 768Mi/1Gi is enough headroom for our PoC's traffic
  # (admin console + OIDC discovery + a small realm) without bloating the
  # cluster's footprint.
  resources:
    requests:
      memory: 768Mi
    limits:
      memory: 1Gi
  db:
    vendor: postgres
    host: keycloak-postgres   # Bare-Postgres Service defined in postgres.yaml
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-postgres-app
      key: username
    passwordSecret:
      name: keycloak-postgres-app
      key: password
  http:
    # Plain HTTP inside the pod; OpenShift Route terminates TLS at the edge.
    httpEnabled: true
  hostname:
    # Full Route URL (deterministic on CRC). Must match `host:` on Route resource.
    hostname: https://keycloak-thatdot-openshift.apps-crc.testing
    strict: false
  proxy:
    headers: xforwarded   # Trust X-Forwarded-* from OpenShift router
  ingress:
    enabled: false        # We provide the Route ourselves (route.yaml)
