# CloudNativePG (CNPG) operator install — synced by application-keycloak.
# Provides the `postgresql.cnpg.io/Cluster` CR that Keycloak's backing
# Postgres uses (postgres-cluster.yaml at wave 1).
#
# Install mode: OwnNamespace. Reuses the existing `thatdot-openshift-operators`
# OperatorGroup. See rhbk-operator-subscription.yaml for the shared-OperatorGroup
# explanation.
#
# Package + channel verification (CNPG ships in multiple catalogs):
#   oc get packagemanifest cloud-native-postgresql -n openshift-marketplace \
#     -o jsonpath='{.status.catalogSource}{"\n"}{.status.defaultChannel}{"\n"}{.status.channels[*].name}{"\n"}'
# If not found, try:
#   oc get packagemanifests -n openshift-marketplace | grep -i postgres
# Adjust `spec.source` (could be `certified-operators` or `community-operators`)
# and `spec.channel` (e.g., `stable-v1.25`, `fast-v1.25`) to match.
#
# OwnNamespace support: CNPG's CSV typically advertises both AllNamespaces and
# OwnNamespace install modes. Confirm with:
#   oc describe packagemanifest cloud-native-postgresql -n openshift-marketplace | grep -A1 -i installmode
# If OwnNamespace is "false", install AllNamespaces by moving this Subscription
# to `openshift-operators` and dropping `sourceNamespace` (different namespace
# than our OperatorGroup; the cluster-scoped OG there handles it). Accept the
# pattern asymmetry — only Cassandra + RHBK stay in `thatdot-openshift-operators`.
#
# sync-wave "0": Wave-1 Postgres `Cluster` CR depends on CRDs this operator
# installs.
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: cloud-native-postgresql
  namespace: thatdot-openshift
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  channel: stable-v1.25
  installPlanApproval: Automatic
  name: cloud-native-postgresql
  source: certified-operators
  sourceNamespace: openshift-marketplace
