# OpenShift trust-bundle ConfigMap, consumed by the QE pod's init containers.
#
# How it gets populated:
#   The OpenShift Cluster Network Operator (CNO) watches for ConfigMaps with
#   the `config.openshift.io/inject-trusted-cabundle: "true"` LABEL and
#   injects the cluster's trust bundle (cluster CA + any custom CAs configured
#   at the proxy/cluster level) into a `ca-bundle.crt` data key.
#
# Why we need this:
#   QE talks to Keycloak via the OpenShift Route (HTTPS, edge-terminated with
#   the cluster's wildcard cert signed by the ingress-operator CA). The JVM
#   running QE doesn't trust that CA by default, so it can't validate
#   Keycloak's TLS chain. The `build-truststore` init container (see
#   patches/build-truststore.yaml) reads the PEM bundle from here and uses
#   `keytool` to build a JKS truststore that the QE container mounts.
#
# Note:
#   - It's a *label*, not an annotation (modern OpenShift docs are authoritative
#     on this — older docs sometimes show annotation but label is the supported
#     mechanism).
#   - The `data: {}` block is intentional. CNO patches the ConfigMap to add the
#     `ca-bundle.crt` key on its next reconcile; specifying `data` here just
#     creates the ConfigMap with no keys initially. We don't commit a stub
#     ca-bundle.crt because we'd just fight CNO on every sync.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trusted-ca-bundle
  namespace: thatdot-openshift
  labels:
    config.openshift.io/inject-trusted-cabundle: "true"
data: {}
