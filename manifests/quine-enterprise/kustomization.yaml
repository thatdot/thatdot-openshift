---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pull the QE chart from helm.thatdot.com and render with our values.
# Requires `--enable-helm` on the ArgoCD instance (set in scripts/bootstrap.sh).
helmCharts:
  - name: quine-enterprise
    repo: https://helm.thatdot.com
    version: 0.5.3
    releaseName: quine-enterprise
    namespace: thatdot-openshift
    valuesFile: values.yaml

# Plain YAML resources merged with the chart's output.
# - route.yaml: OpenShift Route (chart is vanilla-K8s, not OpenShift-aware)
# - trusted-ca.yaml: empty ConfigMap with the inject-trusted-cabundle label —
#   OpenShift CNO fills it with the cluster trust bundle (used by step 6's
#   build-truststore init container).
resources:
  - route.yaml
  - trusted-ca.yaml

# Strategic-merge patches applied to the chart-rendered resources.
#
# Init container order in the rendered Deployment (each adds one entry, in
# the order they're listed below):
#   1. build-truststore   — produces /opt/truststore/cacerts from the
#                           OpenShift trust bundle (JKS with public CAs +
#                           cluster CA). Step 6.
#   2. wait-for-cassandra — TCP probe to quine-dc1-service:9042. Step 3.
#   3. wait-for-keycloak  — HTTPS probe to the realm OIDC discovery endpoint,
#                           cert-validating against the trust bundle. Step 6.
# Effect: QE main container starts only after the JKS is written AND both
# infra deps respond.
patches:
  - path: patches/build-truststore.yaml
    target:
      kind: Deployment
      name: quine-enterprise
  - path: patches/wait-for-cassandra.yaml
    target:
      kind: Deployment
      name: quine-enterprise
  - path: patches/wait-for-keycloak.yaml
    target:
      kind: Deployment
      name: quine-enterprise
