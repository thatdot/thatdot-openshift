# k8ssandra cass-operator install — applied directly with `oc apply` by bootstrap.sh.
#
# Install mode: OwnNamespace. The OperatorGroup lives in `thatdot-openshift` and
# targets that same namespace, so the operator pod runs alongside the workloads
# it manages. Avoids AllNamespaces mode (which would force the operator into the
# cluster-scoped `openshift-operators` namespace and conflict with our
# namespace-scoped GitOps install).
#
# Package name: `cass-operator-community` (the bare `cass-operator` belongs to a
# different/conflicting catalog entry).
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: thatdot-openshift-operators
  namespace: thatdot-openshift
spec:
  targetNamespaces:
    - thatdot-openshift   # OwnNamespace: target == operator's own namespace
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: cass-operator-community
  namespace: thatdot-openshift
spec:
  channel: stable
  installPlanApproval: Automatic
  name: cass-operator-community
  source: community-operators
  sourceNamespace: openshift-marketplace
