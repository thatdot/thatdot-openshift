# ArgoCD Application — Cassandra (cass-operator-managed).
# Applied directly with `oc apply`; not itself GitOps-managed.
#
# Iteration knob: `spec.source.targetRevision`.
#   - During iteration:  the active branch (e.g., `step-3-cassandra`)
#   - After PR merge:    flip to `main` as the last commit on the PR,
#                        then re-apply this file from main.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cassandra
  namespace: openshift-gitops
  finalizers:
    # Cascade-delete synced resources (the CassandraDatacenter CR) when this
    # Application is deleted. The operator then cleans up StatefulSet, PVCs, etc.
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/thatdot/thatdot-openshift
    path: manifests/cassandra
    targetRevision: step-3-cassandra
  destination:
    server: https://kubernetes.default.svc
    namespace: thatdot-openshift
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
