---
apiVersion: v1
kind: Namespace
metadata:
  name: thatdot-openshift
  labels:
    # Tells OpenShift GitOps to grant the ArgoCD instance in `openshift-gitops`
    # permission to manage resources in this namespace. The operator watches
    # for this label and provisions the RoleBinding automatically. Without it,
    # ArgoCD sync fails with "forbidden" on every namespaced resource.
    argocd.argoproj.io/managed-by: openshift-gitops
  annotations:
    openshift.io/display-name: "thatDot OpenShift"
    openshift.io/description: "Quine Enterprise + supporting services for thatDot's enterprise OpenShift deployment"
