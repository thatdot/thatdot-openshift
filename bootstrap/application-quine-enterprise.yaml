# ArgoCD Application — Quine Enterprise.
# Applied directly with `oc apply`; not itself GitOps-managed.
#
# Iteration knob: `spec.source.targetRevision`.
#   - During iteration:  the active branch (e.g., `step-2-basic-qe`)
#   - After PR merge:    flip to `main` as the last commit on the PR,
#                        then re-apply this file from main.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quine-enterprise
  namespace: openshift-gitops
  finalizers:
    # Cascade-delete synced resources when this Application is deleted.
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/thatdot/thatdot-openshift
    path: manifests/quine-enterprise
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: thatdot-openshift
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
